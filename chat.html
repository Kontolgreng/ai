<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<link rel="stylesheet" href="css/style.css">

<style>
.chat-container{
max-width:800px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
}

.msg{
margin:10px 0;
padding:12px 16px;
border-radius:14px;
max-width:70%;
}

.user{
background:#ff2d95;
align-self:flex-end;
}

.ai{
background:#222;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #333;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#111;
color:white;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#ff2d95;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div class="chat-container">

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="prompt" placeholder="Tulis pesan..." />
<button onclick="sendMessage()">Kirim</button>
</div>

</div>

<script src="js/chat.js"></script>

</body>
</html>
